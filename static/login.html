<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login sebagai Relawan — Peta.ni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="auth-page">
    <header class="site-header" data-node-id="144:501">
      <a class="brand" href="/" aria-label="Peta.ni beranda"><img src="/static/assets/petani-logo.svg" alt="" /><span class="brand-word">Peta.<em>ni</em></span></a>
      <button class="mobile-menu-button" type="button" aria-label="Buka menu" aria-expanded="false">☰</button>
      <nav class="main-nav" aria-label="Navigasi utama"><a class="nav-link" href="/">Beranda</a><a class="nav-link" href="/map">Peta</a><a class="nav-link" href="/reports" data-responder-only>Laporan</a></nav>
      <div class="header-actions">
        <a class="whatsapp-link" data-whatsapp-link href="#" aria-label="Hubungi Peta.ni melalui WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.75 13.96c-.25-.13-1.47-.72-1.7-.81-.23-.08-.39-.13-.56.13-.16.25-.64.81-.78.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.38-1.72-.15-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.13-.56-1.35-.77-1.85-.2-.49-.41-.42-.56-.43h-.48c-.17 0-.44.06-.66.31-.23.25-.87.85-.87 2.07s.89 2.4 1.01 2.57c.12.16 1.75 2.67 4.24 3.75.59.26 1.05.41 1.42.52.6.19 1.14.16 1.57.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.11-.23-.17-.48-.29M12.04 21.5h-.01a9.46 9.46 0 0 1-4.82-1.32l-.35-.2-3.59.94.96-3.5-.23-.36A9.45 9.45 0 0 1 2.55 12c0-5.23 4.26-9.5 9.5-9.5a9.43 9.43 0 0 1 6.71 2.79A9.4 9.4 0 0 1 21.55 12c0 5.24-4.27 9.5-9.51 9.5m8.08-17.56A11.35 11.35 0 0 0 12.05.59C5.77.59.66 5.7.66 12c0 2 .52 3.95 1.51 5.67L.56 23.54l6-1.57a11.4 11.4 0 0 0 5.48 1.4h.01c6.28 0 11.39-5.11 11.39-11.39 0-3.04-1.18-5.9-3.33-8.05" /></svg></a>
        <a class="button button-primary session-link" data-session-link href="/login">Contribute Now</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" data-node-id="138:432">
        <h1>Login sebagai Relawan</h1>
        <p class="subtitle">Daftarkan diri Anda sebagai relawan untuk membantu penanganan bencana pertanian</p>
        <form class="auth-form" id="login-form">
          <p class="form-error" id="login-error" role="alert"></p>
          <label>Email/nomor hp<input id="identity" type="text" placeholder="Type here" autocomplete="username" required /></label>
          <label>Password<input id="password" type="password" placeholder="Type here" autocomplete="current-password" required /></label>
          <button class="button button-primary" type="submit">Login</button>
        </form>
        <p class="auth-footer">Don’t have an account?<br /><a href="#" id="register-link">Register</a></p>
        <p class="demo-note">Mode demo: gunakan email/nomor dan password apa pun untuk masuk sebagai responder.</p>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/static/site.js"></script>
    <script>
      document.querySelector("#login-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const identity = document.querySelector("#identity").value.trim();
        const password = document.querySelector("#password").value;
        const error = document.querySelector("#login-error");
        if (!identity || !password) {
          error.textContent = "Isi email/nomor hp dan password terlebih dahulu.";
          error.classList.add("visible");
          return;
        }
        window.PetaNih.setResponderSession(identity);
        const next = new URLSearchParams(window.location.search).get("next");
        window.location.href = next && next.startsWith("/") ? next : "/map";
      });
      document.querySelector("#register-link").addEventListener("click", (event) => {
        event.preventDefault();
        window.PetaNih.showToast("Pendaftaran relawan belum terhubung di mode demo. Anda tetap bisa login dengan data apa pun.", 4800);
      });
    </script>
  </body>
</html>
